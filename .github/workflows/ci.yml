name: CI

permissions: read-all

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs for PRs (same head branch), but never cancel
# pushes to main so that every merge gets a full CI run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    runs-on: [self-hosted, gpu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run `bazel test`
        run: |
          # `/usr/local/bin/circom` on every `[self-hosted, gpu]` runner
          # is the Nix-flake build of `project-llzk/circom`. On the
          # `build-server` runner `/nix/store` is absent so the binary's
          # interpreter cannot be resolved (`cannot execute: required
          # file not found`). A self-contained portable bundle is
          # pre-installed at `$HOME/circom` + `$HOME/libMLIR.so.20.1` on
          # each runner (RUNPATH=`$ORIGIN` so the libs are picked up
          # from the same directory as the binary). Use $HOME so the
          # path resolves correctly regardless of which runner gets the
          # job (a41 or frac). Drop this override once every runner's
          # /usr/local/bin/circom is a working binary.
          export CIRCOM_PATH="$HOME/circom"
          bazel --bazelrc=.bazelrc.ci test \
            --config=ci \
            --config=cuda_clang_official \
            //...

  pre-commit-style:
    if: github.actor != 'fractalyze-dev'
    runs-on: [self-hosted, cpu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4.7.0
        with:
          python-version: "3.10"

      - name: Install cpplint
        run: pip install cpplint

      - name: Run pre-commit
        run: |
          pip install pre-commit
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pre-commit run --from-ref ${{ github.event.pull_request.base.sha }} --to-ref HEAD
          else
            pre-commit run --from-ref HEAD~1 --to-ref HEAD
          fi
